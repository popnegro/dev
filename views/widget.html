<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taxi Widget - Cliente</title>
    <style>
        :root { 
            --primary: var(--color-primary, #000); 
            --accent: var(--color-secondary, #009ee3); 
            --radius: var(--brand-radius, 15px);
        }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .widget { background: white; width: 100%; max-width: 400px; padding: 25px; border-radius: var(--radius); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; font-size: 1.5em; border-bottom: 2px solid #f0f2f5; padding-bottom: 10px; color: var(--primary); font-weight: 700; }

        input { width: 100%; padding: 14px; margin: 12px 0; border: 2px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 15px; transition: all 0.3s ease; }
        input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 4px rgba(0, 158, 227, 0.1); }
        
        button { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.3s; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        button:active { transform: scale(0.98); }
        button:disabled { background: #ccc; cursor: not-allowed; }
        
        .btn-danger { background: #dc3545; margin-top: 15px; }
        
        .status-panel { margin-top: 20px; padding: 18px; background: #f8fbff; border: 1px solid #e1efff; border-left: 5px solid var(--accent); display: none; border-radius: 12px; animation: fadeIn 0.5s; }
        #payment-area a { display: block; background: var(--accent); color: white; text-align: center; padding: 12px; text-decoration: none; border-radius: 8px; margin-top: 15px; font-weight: bold; }

        #estimate-box { 
            margin: 15px 0; 
            padding: 20px; 
            background: #f8fbff; 
            border-radius: var(--radius); 
            border: 2px dashed var(--accent); 
            display: none; 
            text-align: center;
            color: var(--primary);
        }
        .price-tag { color: var(--accent); font-weight: 900; font-size: 2.4em; display: block; margin: 5px 0; line-height: 1; }
        .eta-badge { display: inline-block; background: var(--primary); color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.85em; font-weight: bold; margin-bottom: 10px; }
        

        /* Spinner UX */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-10px); } }

        /* Contenedor Lottie */
        #lottie-search {
            width: 140px;
            height: 140px;
            margin: 0 auto;
            display: none;
        }
    </style>
</head>
<body>

<div class="widget">
    <h2 class="brand-name">Cargando...</h2>
    <div id="form-container">
    <input type="text" id="userName" placeholder="Tu Nombre Completo">
    <input type="text" id="origin" placeholder="📍 ¿Desde dónde sales?">
    <input type="text" id="destination" placeholder="🏁 ¿A dónde vamos?">

    <div id="estimate-box"></div>

    <button id="btnRequest" onclick="solicitarTaxi()">
        <span id="btnText">SOLICITAR TAXI</span>
    </button>
    </div>

    <div id="status-panel" class="status-panel">
        <strong>Estado de tu viaje:</strong>
        <div id="lottie-search"></div>
        <p id="driver-info">Buscando el chofer más cercano...</p>
        <div id="payment-area"></div>
        <button class="btn-danger" onclick="cancelarPedido()">CANCELAR PEDIDO</button>
    </div>
</div>

<script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
<script src="/core/core.js"></script>
<script>
    // Configuración de servidor (Local vs Producción)
    const SERVER_URL = window.location.hostname.includes('localhost') || window.location.hostname === '127.0.0.1'
        ? `${window.location.protocol}//${window.location.host}`
        : 'https://dev-eta-seven.vercel.app';

    let pusher;
    let channel;
    let map;
    let currentBrand;
    let searchAnimation;
    const userId = localStorage.getItem('taxiChatUserId') || `u${Math.random().toString(36).substring(2, 9)}`;
    localStorage.setItem('taxiChatUserId', userId);
    // Función Debounce para limitar la frecuencia de llamadas
    function debounce(func, wait) {
        let timeout;
        return function(...args) {
            clearTimeout(timeout);
            timeout = setTimeout(() => func.apply(this, args), wait);
        };
    }

    // Inicializar Animación Lottie
    function initLottie() {
        searchAnimation = lottie.loadAnimation({
            container: document.getElementById('lottie-search'),
            renderer: 'svg',
            loop: true,
            autoplay: false,
            path: 'https://lottie.host/8254c0e6-993d-495f-9e87-010e47087e5b/8Y7p7Y9i8A.json' // Animación de Taxi/Mapa
        });
    }

    // Esperar a que TaxiChat Core cargue la configuración dinámica
    document.addEventListener('taxichat-ready', (e) => {
        const config = e.detail;
        currentBrand = config.brandID;
        console.log("📦 Configuración recibida en Widget:", config);

        initLottie();

        // UX: Recuperar estado de viaje activo si existe
        if (localStorage.getItem('taxiChatActiveOrder')) {
            mostrarEstadoActivo(JSON.parse(localStorage.getItem('taxiChatActiveOrder')));
        }

        pusher = new Pusher(config.pusher_key, {
            cluster: config.pusher_cluster,
            authEndpoint: `${SERVER_URL}/pusher/auth`
        });

        channel = pusher.subscribe(`private-user-${userId}`);

        // Monitoreo de estado de conexión para feedback del usuario
        pusher.connection.bind('state_change', (states) => {
            console.log(`📡 Pusher: ${states.previous} -> ${states.current}`);
            const driverInfo = document.getElementById('driver-info');
            const statusPanel = document.getElementById('status-panel');

            // Si el panel de estado está visible (hay un pedido activo) informamos al usuario
            if (statusPanel.style.display === 'block') {
                if (states.current === 'unavailable' || states.current === 'failed') {
                    driverInfo.innerHTML = `<span style="color: #dc3545;">⚠️ Problemas de conexión. Reconectando...</span>`;
                } else if (states.current === 'connected') {
                    // Al recuperar conexión, si no hay chofer asignado aún, restauramos el texto
                    if (!driverInfo.innerHTML.includes('✅')) {
                        driverInfo.innerText = "Buscando el chofer más cercano...";
                    }
                }
            }
        });

        // Vincular eventos de Pusher
        channel.bind('confirmacion-cliente', (data) => {
            toggleSearchAnimation(false);
            document.getElementById('driver-info').innerHTML = 
                `✅ <b>${data.chofer}</b> está en camino.<br>Llega en aproximadamente <b>${data.tiempo} min</b>.`;
            
            // Persistir info del chofer por si recarga
            const activeOrder = JSON.parse(localStorage.getItem('taxiChatActiveOrder') || '{}');
            localStorage.setItem('taxiChatActiveOrder', JSON.stringify({...activeOrder, ...data}));
        });

        channel.bind('recibir-pago', (data) => {
            document.getElementById('payment-area').innerHTML = `
                <hr style="border:0; border-top:1px solid #eee; margin:15px 0;">
                <p>Paga tu viaje de forma segura:</p>
                <a href="${data.link}" target="_blank">PAGAR $${data.monto}</a>
            `;
        });
    });

    function toggleSearchAnimation(show) {
        const container = document.getElementById('lottie-search');
        if (show) {
            container.style.display = 'block';
            searchAnimation.play();
        } else {
            container.style.display = 'none';
            searchAnimation.stop();
        }
    }

    function mostrarEstadoActivo(orderData) {
        document.getElementById('form-container').style.display = 'none';
        document.getElementById('status-panel').style.display = 'block';
        
        if (orderData.chofer) {
            toggleSearchAnimation(false);
            document.getElementById('driver-info').innerHTML = 
                `✅ <b>${orderData.chofer}</b> está en camino.<br>Llega en aproximadamente <b>${orderData.tiempo} min</b>.`;
        } else {
            toggleSearchAnimation(true);
        }
    }

    let originAutocomplete, destAutocomplete;
    let selectedOrigin = null;
    let selectedDest = null;

    // Persistencia del nombre para facilitar pruebas
    document.addEventListener('DOMContentLoaded', () => {
        const nameInput = document.getElementById('userName');
        if (nameInput) {
            nameInput.value = localStorage.getItem('userTaxiName') || '';
            nameInput.addEventListener('input', () => {
                localStorage.setItem('userTaxiName', nameInput.value);
            });
        }
    });

    // La función initMaps es llamada por core.js al cargar Google Maps
    function initMaps() {
        const destInput = document.getElementById('destination');
        const originInput = document.getElementById('origin');
        if (!destInput || !originInput) return;

        // Definir los límites geográficos aproximados de Mendoza
        const mendozaBounds = {
            north: -32.70,
            south: -33.10,
            east: -68.60,
            west: -69.10,
        };

        originAutocomplete = new google.maps.places.Autocomplete(originInput);
        destAutocomplete = new google.maps.places.Autocomplete(destInput, {
            bounds: mendozaBounds,
            strictBounds: true, // Obliga a buscar solo dentro de los límites
            componentRestrictions: { country: 'ar' }
        });

        originAutocomplete.addListener('place_changed', () => {
            selectedOrigin = originAutocomplete.getPlace();
            calcularEstimacionDebounced();
        });

        destAutocomplete.addListener('place_changed', () => {
            selectedDest = destAutocomplete.getPlace();
            calcularEstimacionDebounced();
        });

        // Autodetectar ubicación para el campo origen
        // UX: Mejorado para mostrar dirección real, no coordenadas
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(async (p) => {
                // Solo autodetectar si el usuario no ha empezado a escribir manualmente
                if (!originInput.value) {
                    const coords = { lat: p.coords.latitude, lng: p.coords.longitude };
                    const result = await TaxiChat.reverseGeocode(coords.lat, coords.lng);
                    
                    if (result) {
                        selectedOrigin = {
                            formatted_address: result.formatted_address,
                            geometry: { location: coords }
                        };
                        originInput.value = result.formatted_address;
                    }
                    calcularEstimacionDebounced();
                }
            });
        }

        // Resetear validación si el usuario escribe manualmente
        originInput.addEventListener('input', () => { selectedOrigin = null; calcularEstimacionDebounced(); });
        destInput.addEventListener('input', () => { selectedDest = null; calcularEstimacionDebounced(); });
    }

    function calcularEstimacion() {
        const estimateBox = document.getElementById('estimate-box');
        const btnRequest = document.getElementById('btnRequest');

        if (!selectedOrigin || !selectedDest || !selectedOrigin.geometry || !selectedDest.geometry) {
            estimateBox.style.display = 'none';
            estimateBox.innerHTML = "";
            if (btnRequest) {
                btnRequest.disabled = true;
                btnRequest.innerHTML = `<span id="btnText">CONFIRMAR Y PEDIR TAXI</span>`;
            }
            return;
        }

        if (btnRequest) {
            btnRequest.disabled = true;
            btnRequest.innerHTML = `<div class="spinner"></div> CARGANDO PRECIO...`;
        }

        const service = new google.maps.DistanceMatrixService();
        
        service.getDistanceMatrix({
            origins: [selectedOrigin.geometry.location],
            destinations: [selectedDest.geometry.location],
            travelMode: google.maps.TravelMode.DRIVING,
        }, (response, status) => {
            if (btnRequest) btnRequest.innerHTML = `<span id="btnText">CONFIRMAR Y PEDIR TAXI</span>`;

            if (status === 'OK' && response.rows[0].elements[0].status === 'OK') {
                const element = response.rows[0].elements[0];
                const distanceText = element.distance.text;
                const durationText = element.duration.text;
                const distanceValue = element.distance.value / 1000; // Convertir metros a KM

                // Algoritmo de precio: $400 base + $150 por KM
                const price = (distanceValue * 150 + 400).toFixed(0);
                
                // Generar Link dinámico para Google Maps
                const getLatLng = (place) => {
                    if (!place || !place.geometry) return null;
                    const loc = place.geometry.location;
                    return typeof loc.lat === 'function' ? `${loc.lat()},${loc.lng()}` : `${loc.lat},${loc.lng}`;
                };

                const originParam = getLatLng(selectedOrigin) || encodeURIComponent(document.getElementById('origin').value);
                const destParam = getLatLng(selectedDest) || encodeURIComponent(document.getElementById('destination').value);
                const googleMapsUrl = `https://www.google.com/maps/dir/?api=1&origin=${originParam}&destination=${destParam}&travelmode=driving`;

                estimateBox.style.display = 'block';
                estimateBox.innerHTML = `
                    <span class="eta-badge">⏱ LLEGA EN ${durationText.toUpperCase()}</span>
                    <small style="display:block; color: #666; text-transform: uppercase; letter-spacing: 1px; font-size: 0.7em; font-weight: bold;">Precio Final Estimado</small>
                    <span class="price-tag">$${price}</span>
                    
                    <div style="font-size: 0.8em; margin-top: 10px; opacity: 0.6;">Recorrido total: ${distanceText}</div>
                    <div style="margin-top: 10px; padding-top: 10px; border-top: 1px dotted var(--accent); text-align: center;">
                        <a href="${googleMapsUrl}" target="_blank" style="color: var(--accent); text-decoration: none; font-weight: bold; font-size: 0.85em;">
                            🗺️ Ver recorrido completo ↗
                        </a>
                    </div>
                `;

                if (btnRequest) {
                    btnRequest.disabled = false;
                    btnRequest.innerHTML = `<span id="btnText">SOLICITAR TAXI</span>`;
                }
            } else {
                estimateBox.innerHTML = "No se pudo calcular la distancia.";
                if (btnRequest) btnRequest.disabled = true;
            }
        });
    }

    // Creamos la versión con debounce (500ms de espera)
    const calcularEstimacionDebounced = debounce(calcularEstimacion, 500);

    async function solicitarTaxi() {
        const user = document.getElementById('userName').value;
        const dest = document.getElementById('destination').value;
        
        if (!user || !selectedOrigin?.geometry || !selectedDest?.geometry) {
            return alert("Por favor, completa nombre, origen y destino válidos.");
        }

        mostrarEstadoActivo({});
        document.getElementById('btnRequest').disabled = true;
        
        const orderInfo = {
            userId: userId,
            brand: currentBrand,
            nombre: user
        };
        localStorage.setItem('taxiChatActiveOrder', JSON.stringify(orderInfo));

        try {
            await fetch(`${SERVER_URL}/api/nuevo-pedido`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    userId: userId,
                    brand: currentBrand,
                    nombre: user,
                    origen: document.getElementById('origin').value,
                    destino: dest
                })
            });
            console.log("Pedido enviado al dashboard");
        } catch (error) {
            console.error("Error al pedir taxi:", error);
            alert("Error de conexión con la central.");
        }
    }

    async function cancelarPedido() {
        // UX: Confirmación obligatoria para evitar errores
        if (!confirm("¿Seguro que deseas cancelar tu pedido?")) return;

        try {
            await fetch(`${SERVER_URL}/api/cancelar-pedido`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: userId })
            });
            localStorage.removeItem('taxiChatActiveOrder');
            console.log("Cancelación enviada al servidor");
        } catch (error) {
            console.error("Error al notificar cancelación:", error);
        }

        toggleSearchAnimation(false);
        // 1. Ocultar el panel de estado y resetear el botón de solicitud
        document.getElementById('status-panel').style.display = 'none';
        document.getElementById('form-container').style.display = 'block';
        const btnRequest = document.getElementById('btnRequest');
        btnRequest.disabled = false;
        btnRequest.innerHTML = `<span id="btnText">SOLICITAR TAXI</span>`;

        // 2. Limpiar los campos de entrada de ubicación
        document.getElementById('origin').value = '';
        document.getElementById('destination').value = '';
        document.getElementById('estimate-box').innerHTML = '';

        // 3. Resetear las variables de selección de Google Maps
        selectedOrigin = null;
        selectedDest = null;


        // 5. Resetear información de conductor y pagos
        document.getElementById('driver-info').innerText = "Buscando el chofer más cercano...";
        document.getElementById('payment-area').innerHTML = '';
        
        console.log("Pedido cancelado y formulario reseteado.");
    }
</script>

</body>
</html>
