<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taxi Widget - Cliente</title>
    <style>
        :root { --primary: #000; --accent: #009ee3; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .widget { background: white; width: 100%; max-width: 400px; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; font-size: 1.5em; border-bottom: 2px solid #eee; padding-bottom: 10px; color: var(--primary); }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.3s; }
        button:hover { opacity: 0.8; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .btn-danger { background: #dc3545; margin-top: 15px; }
        
        .status-panel { margin-top: 20px; padding: 15px; background: #f8f9fa; border-left: 5px solid var(--accent); display: none; border-radius: 8px; animation: fadeIn 0.5s; }
        #payment-area a { display: block; background: var(--accent); color: white; text-align: center; padding: 12px; text-decoration: none; border-radius: 8px; margin-top: 15px; font-weight: bold; }
        .price-tag { color: #2ecc71; font-weight: bold; font-size: 1.2em; }
        #map-canvas { width: 100%; height: 180px; margin-top: 15px; border-radius: 8px; display: none; border: 1px solid #ddd; }

        /* Spinner UX */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    </style>
</head>
<body>

<div class="widget">
    <h2>Pedir un Taxi</h2>
    <input type="text" id="userName" placeholder="Tu Nombre Completo">
    <input type="text" id="origin" placeholder="¿Desde dónde sales?">
    <input type="text" id="destination" placeholder="¿A dónde vamos?">
    
    <div id="estimate-box" style="margin: 10px 0; font-size: 0.9em; color: #666;"></div>
    <div id="map-canvas"></div>
    
    <button id="btnRequest" onclick="solicitarTaxi()">
        <span id="btnText">SOLICITAR TAXI</span>
    </button>

    <div id="status-panel" class="status-panel">
        <strong>Estado de tu viaje:</strong>
        <p id="driver-info">Buscando el chofer más cercano...</p>
        <div id="payment-area"></div>
        <button class="btn-danger" onclick="cancelarPedido()">CANCELAR PEDIDO</button>
    </div>
</div>

<script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
<script src="/core/core.js"></script>
<script>
    // Configuración de servidor (Local vs Producción)
    const SERVER_URL = window.location.hostname.includes('localhost') || window.location.hostname === '127.0.0.1'
        ? `${window.location.protocol}//${window.location.host}`
        : 'https://dev-eta-seven.vercel.app';

    let pusher;
    let channel;
    let map, directionsService, directionsRenderer;
    const userId = "123"; 

    // Esperar a que TaxiChat Core cargue la configuración dinámica
    document.addEventListener('taxichat-ready', (e) => {
        const config = e.detail;
        console.log("📦 Configuración recibida en Widget:", config);

        pusher = new Pusher(config.pusher_key, {
            cluster: config.pusher_cluster,
            authEndpoint: `${SERVER_URL}/pusher/auth`
        });

        channel = pusher.subscribe(`private-user-${userId}`);

        // Vincular eventos de Pusher
        channel.bind('confirmacion-cliente', (data) => {
            document.getElementById('driver-info').innerHTML = 
                `✅ <b>${data.chofer}</b> está en camino.<br>Llega en aproximadamente <b>${data.tiempo} min</b>.`;
        });

        channel.bind('recibir-pago', (data) => {
            document.getElementById('payment-area').innerHTML = `
                <hr style="border:0; border-top:1px solid #eee; margin:15px 0;">
                <p>Paga tu viaje de forma segura:</p>
                <a href="${data.link}" target="_blank">PAGAR $${data.monto}</a>
            `;
        });
    });

    let originAutocomplete, destAutocomplete;
    let selectedOrigin = null;
    let selectedDest = null;

    // Ejecutar cuando el HTML esté cargado
    document.addEventListener('DOMContentLoaded', () => {
        const nameInput = document.getElementById('userName');
        if (nameInput) {
            nameInput.value = localStorage.getItem('userTaxiName') || '';
            nameInput.addEventListener('input', () => {
                localStorage.setItem('userTaxiName', nameInput.value);
            });
        }
    });

    function initMaps() {
        const destInput = document.getElementById('destination');
        const originInput = document.getElementById('origin');
        if (!destInput || !originInput) return;

        // Inicializar Mapa y Servicios de Ruta
        map = new google.maps.Map(document.getElementById('map-canvas'), {
            center: { lat: -32.8895, lng: -68.8458 },
            zoom: 14,
            disableDefaultUI: true
        });
        directionsService = new google.maps.DirectionsService();
        directionsRenderer = new google.maps.DirectionsRenderer({ map: map });

        originAutocomplete = new google.maps.places.Autocomplete(originInput);
        destAutocomplete = new google.maps.places.Autocomplete(destInput);

        originAutocomplete.addListener('place_changed', () => {
            selectedOrigin = originAutocomplete.getPlace();
            calcularEstimacion();
        });

        destAutocomplete.addListener('place_changed', () => {
            selectedDest = destAutocomplete.getPlace();
            calcularEstimacion();
        });

        // Autodetectar ubicación para el campo origen
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(p => {
                // Solo autodetectar si el usuario no ha empezado a escribir manualmente
                if (!originInput.value) {
                    const coords = { lat: p.coords.latitude, lng: p.coords.longitude };
                    selectedOrigin = {
                        name: "Ubicación actual",
                        geometry: { location: coords }
                    };
                    originInput.value = `Ubicación actual (${coords.lat.toFixed(4)}, ${coords.lng.toFixed(4)})`;
                    calcularEstimacion();
                }
            });
        }

        // Resetear validación si el usuario escribe manualmente
        originInput.addEventListener('input', () => { selectedOrigin = null; calcularEstimacion(); });
        destInput.addEventListener('input', () => { selectedDest = null; calcularEstimacion(); });
    }

    function calcularEstimacion() {
        const estimateBox = document.getElementById('estimate-box');
        if (!selectedOrigin || !selectedDest || !selectedOrigin.geometry || !selectedDest.geometry) {
            estimateBox.innerHTML = "";
            return;
        }

        const service = new google.maps.DistanceMatrixService();
        
        service.getDistanceMatrix({
            origins: [selectedOrigin.geometry.location],
            destinations: [selectedDest.geometry.location],
            travelMode: google.maps.TravelMode.DRIVING,
        }, (response, status) => {
            if (status === 'OK' && response.rows[0].elements[0].status === 'OK') {
                const element = response.rows[0].elements[0];
                const distanceText = element.distance.text;
                const durationText = element.duration.text;
                const distanceValue = element.distance.value / 1000; // Convertir metros a KM

                // Algoritmo de precio: $400 base + $150 por KM
                const price = (distanceValue * 150 + 400).toFixed(0);
                
                estimateBox.innerHTML = 
                    `Distancia: ${distanceText} (${durationText}) | <span class="price-tag">Est: $${price}</span>`;
                trazarRuta();
            } else {
                estimateBox.innerHTML = "No se pudo calcular la distancia.";
            }
        });
    }

    function trazarRuta() {
        if (!selectedOrigin || !selectedDest || !selectedOrigin.geometry || !selectedDest.geometry) return;
        
        document.getElementById('map-canvas').style.display = 'block';

        directionsService.route({
            origin: selectedOrigin.geometry.location,
            destination: selectedDest.geometry.location,
            travelMode: google.maps.TravelMode.DRIVING
        }, (result, status) => {
            if (status === 'OK') directionsRenderer.setDirections(result);
        });
    }

    async function solicitarTaxi() {
        const user = document.getElementById('userName').value;
        const dest = document.getElementById('destination').value;
        
        if (!user) return alert("Por favor, ingresa tu nombre");
        
        if (!selectedOrigin || !selectedOrigin.geometry) {
            return alert("Por favor, selecciona un punto de origen válido de las sugerencias de Google Maps.");
        }

        if (!selectedDest || !selectedDest.geometry) {
            return alert("Por favor, selecciona un destino válido de las sugerencias de Google Maps.");
        }

        document.getElementById('status-panel').style.display = 'block';
        document.getElementById('btnRequest').disabled = true;
        document.getElementById('btnRequest').innerHTML = `<div class="spinner"></div> BUSCANDO CHOFER...`;
        
        try {
            await fetch(`${SERVER_URL}/api/nuevo-pedido`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    userId: userId,
                    nombre: user,
                    origen: document.getElementById('origin').value,
                    destino: dest
                })
            });
            console.log("Pedido enviado al dashboard");
        } catch (error) {
            console.error("Error al pedir taxi:", error);
            alert("Error de conexión con la central.");
        }
    }

    async function cancelarPedido() {
        try {
            await fetch(`${SERVER_URL}/api/cancelar-pedido`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: userId })
            });
            console.log("Cancelación enviada al servidor");
        } catch (error) {
            console.error("Error al notificar cancelación:", error);
        }

        // 1. Ocultar el panel de estado y resetear el botón de solicitud
        document.getElementById('status-panel').style.display = 'none';
        const btnRequest = document.getElementById('btnRequest');
        btnRequest.disabled = false;
        btnRequest.innerHTML = `<span id="btnText">SOLICITAR TAXI</span>`;

        // 2. Limpiar los campos de entrada de ubicación
        document.getElementById('origin').value = '';
        document.getElementById('destination').value = '';
        document.getElementById('estimate-box').innerHTML = '';

        // 3. Resetear las variables de selección de Google Maps
        selectedOrigin = null;
        selectedDest = null;

        // 4. Limpiar el mapa y las rutas trazadas
        if (directionsRenderer) {
            directionsRenderer.setDirections({ routes: [] });
        }
        document.getElementById('map-canvas').style.display = 'none';

        // 5. Resetear información de conductor y pagos
        document.getElementById('driver-info').innerText = "Buscando el chofer más cercano...";
        document.getElementById('payment-area').innerHTML = '';
        
        console.log("Pedido cancelado y formulario reseteado.");
    }
</script>

<!-- Google Maps se carga dinámicamente vía core.js con la API Key del bootstrap -->

</body>
</html>
