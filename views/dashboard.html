<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Operador - Central de Taxis</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #eef2f7; display: flex; }
        .sidebar { width: 200px; background: #1a1a1a; color: white; height: 100vh; padding: 20px; }
        .content { flex-grow: 1; padding: 30px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); max-width: 600px; }
        .control-group { margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 6px; }
        .btn { padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; }
        .btn-assign { background: #2ecc71; }
        .btn-pay { background: #009ee3; }
        .btn:disabled {
            background: #ccc !important;
            cursor: not-allowed;
        }
        .status-badge { display: inline-block; padding: 5px 10px; background: #fff3cd; color: #856404; border-radius: 20px; font-size: 0.8em; margin-bottom: 10px; }
        .order-item { padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; transition: 0.2s; }
        .order-item:hover { background: #f0f7ff; }
        .order-item.active { border-left: 4px solid #009ee3; background: #f0f7ff; }
        #orders-list { margin-top: 15px; max-height: 400px; overflow-y: auto; }
        .empty-msg { color: #999; font-style: italic; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>TAXI ADMIN</h2>
    <hr style="border-color: #333">
    <h4>Pedidos Entrantes</h4>
    <div id="orders-list">
        <p class="empty-msg">No hay pedidos nuevos...</p>
    </div>
</div>

<div class="content">
    <h1>Panel de Control</h1>
    
    <div class="card">
        <div class="status-badge">Ningún pedido seleccionado</div>
        <h3>Gestión de Viaje</h3>
        <p>Asigna un chofer y genera el link de pago para el cliente.</p>
        
        <div class="control-group">
            <input type="text" id="driverName" placeholder="Nombre del Chofer">
            <input type="number" id="eta" placeholder="Minutos de llegada">
            <button class="btn btn-assign" id="btnAssign" onclick="asignar()" disabled>ASIGNAR CHOFER</button>
            
            <input type="number" id="amount" placeholder="Monto total ($)">
            <button class="btn btn-pay" id="btnPay" onclick="generarLink()" disabled>GENERAR LINK PAGO</button>
        </div>
    </div>
</div>

<script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
<script>
    // Configuración de servidor (Local vs Producción)
    const SERVER_URL = window.location.hostname.includes('localhost') || window.location.hostname === '127.0.0.1'
        ? `${window.location.protocol}//${window.location.host}`
        : 'https://dev-eta-seven.vercel.app';

    let userId = null; 
    let pusher;
    let adminChannel;

    // Esperar a que TaxiChat Core cargue la configuración dinámica
    document.addEventListener('taxichat-ready', (e) => {
        const config = e.detail;

        pusher = new Pusher(config.pusher_key, {
            cluster: config.pusher_cluster,
            authEndpoint: `${SERVER_URL}/pusher/auth`
        });

        adminChannel = pusher.subscribe('private-admin');

        // Escuchar nuevos pedidos
        adminChannel.bind('nuevo-pedido', (data) => {
            const list = document.getElementById('orders-list');
            const emptyMsg = list.querySelector('.empty-msg');
            if(emptyMsg) emptyMsg.remove();

            const orderDiv = document.createElement('div');
            orderDiv.className = 'order-item';
            orderDiv.setAttribute('data-user-id', data.userId);
            orderDiv.onclick = (e) => selectOrder(e, data.userId, data.id, data.nombre);
            orderDiv.innerHTML = `
                <strong>#${data.id} - ${data.nombre}</strong><br>
                <small>${data.destino.substring(0, 25)}...</small>
            `;
            list.prepend(orderDiv);
        });

        // Escuchar cancelaciones
        adminChannel.bind('pedido-cancelado', (data) => {
            const list = document.getElementById('orders-list');
            const orderItems = list.querySelectorAll('.order-item');
            orderItems.forEach(item => {
                if (item.getAttribute('data-user-id') === data.userId) {
                    item.remove();
                }
            });

            if (list.children.length === 0) {
                list.innerHTML = '<p class="empty-msg">No hay pedidos nuevos...</p>';
            }

            if (userId === data.userId) {
                document.querySelector('.status-badge').innerText = `Pedido Cancelado por el Usuario`;
                userId = null;
                document.getElementById('btnAssign').disabled = true;
                document.getElementById('btnPay').disabled = true;
            }
        });
    });

    function validarBotonPago() {
        const monto = parseFloat(document.getElementById('amount').value);
        const btnPay = document.getElementById('btnPay');
        // El botón se habilita solo si hay un usuario seleccionado y el monto es mayor a 0
        btnPay.disabled = !userId || isNaN(monto) || monto <= 0;
    }

    // Escuchar cambios en el campo de monto para validar el botón
    document.getElementById('amount').addEventListener('input', validarBotonPago);

    function selectOrder(e, id, ticket, name) {
        userId = id;
        document.querySelector('.status-badge').innerText = `Pedido Pendiente #${ticket} - ${name}`;
        document.querySelectorAll('.order-item').forEach(el => el.classList.remove('active'));
        e.currentTarget.classList.add('active');
        
        // Habilitar asignación y validar estado del botón de pago
        document.getElementById('btnAssign').disabled = false;
        validarBotonPago();
    }

    // 1. Asignar Chofer
    async function asignar() {
        if (!userId) return alert("Selecciona un pedido primero");
        
        const chofer = document.getElementById('driverName').value;
        const tiempo = document.getElementById('eta').value;

        if(!chofer || !tiempo) return alert("Faltan datos de asignación");

        try {
            await fetch(`${SERVER_URL}/api/asignar-taxi`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId, chofer, tiempo })
            });
            alert("Chofer asignado y notificación enviada vía Pusher.");
        } catch (e) {
            alert("Error al asignar chofer.");
        }
    }

    // 2. Generar Link de Mercado Pago vía Servidor
    async function generarLink() {
        if (!userId) return alert("Selecciona un pedido primero");

        const monto = document.getElementById('amount').value;
        if(!monto) return alert("Ingresa un monto válido");

        try {
            const res = await fetch(`${SERVER_URL}/create-preference`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title: "Servicio de Taxi", price: monto })
            });
            const data = await res.json();

            if(data.init_point) {
                // Enviar el link al cliente invocando el endpoint de la API
                await fetch(`${SERVER_URL}/api/enviar-link-pago`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, link: data.init_point, monto: monto })
                });
                alert("Link de Mercado Pago generado y enviado.");
            }
        } catch (e) {
            alert("Error al conectar con el servidor de pagos.");
        }
    }
</script>

</body>
</html>
